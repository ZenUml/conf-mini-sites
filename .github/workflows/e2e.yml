name: E2E

# Playwright E2E for this SINGLE-VARIANT app. Two Playwright projects map to two
# jobs here:
#   • api — hits the deployed control + dispatch Workers with CONTROL_SHARED_SECRET.
#           No browser, no Atlassian login. This is the DETERMINISTIC, always-on gate:
#           it only needs one secret and runs in seconds, so it fronts every PR.
#   • ui  — drives the Forge `mini-site` macro on a real Confluence page. Needs the
#           full Atlassian login (email/token/user/pass/OTP) on top of the shared
#           secret, so it is OPT-IN: it self-skips unless those secrets are configured.
#
# Deliberately simpler than conf-app's e2e-test.yml: ONE variant, so NO sharding,
# NO per-shard auth-dedup, NO daily-session cache matrix. The api project is fast
# and stateless; the ui project runs `setup` (login) + `ui` in a single job and the
# Playwright config makes `ui` depend on `setup` automatically (no manual ordering).
#
# Three entry points:
#   • workflow_call    — so smoke-test.yml and release.yml can reuse this exact gate.
#   • workflow_dispatch — manual runs from the Actions tab.
#   • pull_request     — the api job gates every PR (ui self-skips without secrets).
#
# NOTE: no git remote is configured yet (the GitHub repo slug is the placeholder
# ZenUml/conf-mini-sites). This workflow only takes effect once the repo is pushed to
# a GitHub remote — set the remote first.

on:
  # Reusable by smoke-test.yml / release.yml. Callers pass secrets explicitly and
  # may override the deployed-stack URLs / target site via inputs.
  workflow_call:
    inputs:
      control-url:
        type: string
        required: false
        description: 'Override CONTROL_URL (the remote/control Worker base URL). Defaults to the dev Worker.'
      dispatch-url:
        type: string
        required: false
        description: 'Override DISPATCH_URL (the dispatch/serve Worker base URL). Defaults to the dev Worker.'
      e2e-site:
        type: string
        required: false
        description: 'Override E2E_SITE (Confluence host, no scheme). Defaults to lite-dev.atlassian.net.'
    secrets:
      # api gate needs ONLY this one.
      CONTROL_SHARED_SECRET:
        required: false
        description: 'Shared secret for the control Worker. Required for the api gate; absence makes both jobs skip.'
      # The rest are the Atlassian login the ui job needs; all optional so the
      # reusable workflow degrades to api-only when they are not provided.
      FORGE_EMAIL:
        required: false
      FORGE_API_TOKEN:
        required: false
      ZENUML_STAGE_USERNAME:
        required: false
      ZENUML_STAGE_PASSWORD:
        required: false
      ATLASSIAN_OTP:
        required: false

  workflow_dispatch:
    inputs:
      control-url:
        type: string
        required: false
        description: 'Override CONTROL_URL. Defaults to the dev Worker.'
      dispatch-url:
        type: string
        required: false
        description: 'Override DISPATCH_URL. Defaults to the dev Worker.'
      e2e-site:
        type: string
        required: false
        description: 'Override E2E_SITE. Defaults to lite-dev.atlassian.net.'

  # On a PR the api job is the gate. When this workflow runs from `pull_request`
  # (not from a caller), `secrets` reads resolve against the repo's own secrets;
  # a fork PR has none, so the `if` guards below make the jobs skip gracefully.
  pull_request:

jobs:
  # ── api: the deterministic, always-on gate ──────────────────────────────────
  # Job-level guard: skip the whole job when CONTROL_SHARED_SECRET is empty (e.g.
  # a fork PR, or a caller that passed no secret). A secretless context SKIPS
  # rather than fails — a skipped required check is green, so PRs are never wedged.
  api:
    name: api (control + dispatch Workers)
    if: ${{ secrets.CONTROL_SHARED_SECRET != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run api project
        run: npx playwright test --project=api
        env:
          CI: 'true'
          CONTROL_SHARED_SECRET: ${{ secrets.CONTROL_SHARED_SECRET }}
          # Non-secret overrides (blank → env helper falls back to its dev defaults).
          CONTROL_URL: ${{ inputs.control-url }}
          DISPATCH_URL: ${{ inputs.dispatch-url }}
          E2E_SITE: ${{ inputs.e2e-site }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          if-no-files-found: ignore

  # ── ui: opt-in, runs only when the Confluence/Forge login secrets are set ────
  # needs: api so the cheap gate fails fast before we pay for an Atlassian login.
  # Whole-job guard on every secret the login needs (plus the shared secret) — if
  # any are missing the job skips instead of failing on a half-configured login.
  ui:
    name: ui (Forge mini-site macro on Confluence)
    needs: api
    if: >-
      ${{ secrets.CONTROL_SHARED_SECRET != ''
        && secrets.FORGE_EMAIL != ''
        && secrets.FORGE_API_TOKEN != ''
        && secrets.ZENUML_STAGE_USERNAME != ''
        && secrets.ZENUML_STAGE_PASSWORD != ''
        && secrets.ATLASSIAN_OTP != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run ui project (setup login runs first, via config dependency)
        # The Playwright config makes `ui` depend on `setup`, so naming only `ui`
        # still runs the login bootstrap that writes tests/e2e/.auth/state.json.
        run: npx playwright test --project=ui
        env:
          CI: 'true'
          CONTROL_SHARED_SECRET: ${{ secrets.CONTROL_SHARED_SECRET }}
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          ZENUML_STAGE_USERNAME: ${{ secrets.ZENUML_STAGE_USERNAME }}
          ZENUML_STAGE_PASSWORD: ${{ secrets.ZENUML_STAGE_PASSWORD }}
          ATLASSIAN_OTP: ${{ secrets.ATLASSIAN_OTP }}
          CONTROL_URL: ${{ inputs.control-url }}
          DISPATCH_URL: ${{ inputs.dispatch-url }}
          E2E_SITE: ${{ inputs.e2e-site }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          if-no-files-found: ignore
      - name: Upload auth storage state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-state-ui
          path: tests/e2e/.auth/state.json
          if-no-files-found: ignore
      - name: Upload traces (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-ui
          path: test-results/**/trace.zip
          if-no-files-found: ignore
