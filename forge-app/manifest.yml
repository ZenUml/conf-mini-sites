# Conf Mini-Sites — Forge Confluence app (CONTEXT.md 2026-06-17). Forge shell + Cloudflare Workers-for-Platforms
# backend. This app is a SEPARATE deployable from the Cloudflare Workers (which live at the repo root); it is
# kept in its own directory so Forge's bundled toolchain never sees the Workers' tsconfig. The macro is a
# Custom UI that:
#   • asks the resolver for a grant-signed serve URL and embeds the mini-site in a nested iframe served by the
#     Cloudflare DISPATCH Worker (the bytes never enter Forge — the WfP per-instance Worker serves them);
#   • lets an editor upload a multi-file bundle → resolver `publish` → Cloudflare CONTROL Worker (which the
#     Forge invocation token authorizes) → provisions a per-instance Worker.
# Forge inherits Confluence permissions, so there is no self-built permission gateway.
modules:
  macro:
    - key: mini-site
      title: Mini-Site
      description: Embed a multi-file interactive mini-site (prototype, dashboard,
        tool) on this page.
      resource: view
      resolver:
        function: resolver
  # preUninstall fires when an admin uninstalls the app (UI or CLI), BEFORE teardown finalises — our window to
  # tell the control Worker to schedule deletion of this site's Cloudflare-hosted bundles (30 days later, not
  # indefinitely). See forge-app/src/index.js `preUninstall`.
  preUninstall:
    - key: mini-site-pre-uninstall
      function: pre-uninstall
  function:
    - key: resolver
      handler: index.handler
    - key: pre-uninstall
      handler: index.preUninstall

resources:
  - key: view
    path: static/view
  # The full "Bold Editorial" Publisher, opened in a fullscreen Forge modal from the inline launcher.
  - key: publisher
    path: static/publisher

# The CONTROL Worker is a Forge remote. The resolver calls it via invokeRemote() — `compute` in operations —
# because Forge attaches the Forge Invocation Token (FIT) only to invocations routed through a declared
# remote; plain api.fetch(url) is external egress and carries NO token (observed live 2026-07-16). No auth:
# block is needed for the FIT (auth.appUserToken/appSystemToken only add OAuth tokens for calling Atlassian
# APIs, which we don't do, so no admin-consent scopes). The Worker validates the FIT as the primary, binding
# credential (RS256/JWKS + iss/aud — src/gateway/authorize.ts); the x-mini-sites-secret the resolver also
# sends remains the CI/E2E credential for calls that don't transit Forge (ECOHELP-145889).
remotes:
  - key: control
    baseUrl: https://conf-mini-sites-remote-dev.zenuml.workers.dev
    operations:
      - fetch
      - compute
  # Production control Worker (the prod env's CONTROL_BASE_URL points here).
  - key: control-prod
    baseUrl: https://conf-mini-sites-remote-production.zenuml.workers.dev
    operations:
      - fetch
      - compute

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/2efdb7d9-ee5a-4294-b56a-b514e36e1a98
  # Paid-via-Atlassian listing: the app is licensed. Forge injects license context into the resolver/UI;
  # enforcement (degrade when inactive) is tracked in EAG-92. Adding this disables installation-link sharing
  # (Marketplace-only from now on), but the app stays in the "Choose a Forge app" picker (sharing stays enabled).
  licensing:
    enabled: true
  # CONTROL_BASE_URL (read by the resolver as process.env.CONTROL_BASE_URL) is set via the CLI:
  #   forge variables set CONTROL_BASE_URL https://conf-mini-sites-remote-dev.zenuml.workers.dev

permissions:
  scopes: []
  external:
    fetch:
      backend:
        - address: https://conf-mini-sites-remote-dev.zenuml.workers.dev
        # Production control Worker — the prod env's CONTROL_BASE_URL resolves here (resolver api.fetch egress).
        - address: https://conf-mini-sites-remote-production.zenuml.workers.dev
    frames:
      - address: https://conf-mini-sites-dispatch-dev.zenuml.workers.dev
        # Production dispatch Worker — the nested mini-site iframe in the prod Custom UI.
      - address: https://conf-mini-sites-dispatch-production.zenuml.workers.dev
