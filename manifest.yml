# Conf Mini-Sites — Forge Custom UI Confluence macro (Forge-native; see CONTEXT.md). Forge inherits Confluence
# permissions, so there is no self-built auth gateway. The macro embeds a multi-file static mini-site stored in
# Forge app storage and reassembled client-side in the Custom UI.
#
# Built incrementally: this is the minimal view-only macro to validate the deploy/install/render pipeline;
# the resolver (storage + publish), the editor (upload), and reassembly are layered on next.
modules:
  macro:
    - key: mini-site
      title: Mini-Site
      description: Embed a multi-file interactive mini-site (prototype, dashboard,
        tool) on this page.
      resource: view
resources:
  - key: view
    path: static/view
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/2efdb7d9-ee5a-4294-b56a-b514e36e1a98
permissions:
  scopes: []
