# Dispatch Worker (the auth gateway) — DEV. The real namespace + D1 ids are filled in once the Cloudflare
# Workers-for-Platforms account exists (see validation/G1 — the residency answer also confirms we're on WfP).
name = "conf-mini-sites-dev"
# main = "src/dispatch/index.ts"   # the auth gateway entrypoint lands in Stage 3
compatibility_date = "2026-06-16"

# Workers for Platforms: ONE dispatch namespace. User Workers (ms-<instanceId>) are uploaded into it and are
# NOT independently routable — reachable only via env.MINISITES.get(name).fetch() from this Worker
# (DESIGN §1.1, INV-GW-14).
#   create with:  npx wrangler dispatch-namespace create mini-sites-dev
[[dispatch_namespaces]]
binding = "MINISITES"
namespace = "mini-sites-dev"

# D1 — the MiniSiteInstance mapping (migrations/0001_mini_site_instance.sql).
#   create with:  npx wrangler d1 create conf-mini-sites-dev   (then paste the id below)
[[d1_databases]]
binding = "DB"
database_name = "conf-mini-sites-dev"
database_id = "TODO-from-wrangler-d1-create"

# Added as their stages land:
#   KV  PERM_CACHE_KV      — permission decision cache (DESIGN §2.6)
#   R2  BUNDLE_STAGING     — staged bundle bytes during provisioning (DESIGN §3.4)
#   R2  AUDIT_ARCHIVE      — append-only audit archive (I9)
#   Workflows  PROVISION   — the ProvisionInstance durable job (DESIGN §3.4)
#   Secrets    K_ENC, K_GRANT, X_CRON_SECRET, WFP_API_TOKEN
